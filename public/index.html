<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiabeticSpace</title>
    <meta http-equiv="refresh" content="0; url=/diabeticspace.html" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09111d;
        color: #f5f7fb;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(73, 163, 255, 0.16), transparent 34%),
          linear-gradient(180deg, #0b1424 0%, #09111d 100%);
      }
      .shell {
        width: min(720px, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(146, 182, 255, 0.18);
        border-radius: 24px;
        background: rgba(11, 20, 36, 0.9);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 5vw, 3rem);
      }
      p {
        margin: 0 0 1rem;
        line-height: 1.6;
        color: #c9d7ee;
      }
      .links {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1.5rem;
      }
      a {
        color: inherit;
        text-decoration: none;
        padding: 0.85rem 1.1rem;
        border-radius: 999px;
        border: 1px solid rgba(146, 182, 255, 0.2);
      }
      a.primary {
        background: linear-gradient(135deg, #3ea7ff, #79c4ff);
        color: #08111e;
        font-weight: 700;
      }
    </style>
    <script>
      window.location.replace('/diabeticspace.html');
    </script>
  </head>
  <body>
    <main class="shell">
      <h1>Opening DiabeticSpace…</h1>
      <p>The root application now opens the diabetic-friendly recipe assistant first.</p>
      <p>If your browser does not jump automatically, use one of the links below.</p>
      <div class="links">
        <a class="primary" href="/diabeticspace.html">Open DiabeticSpace</a>
        <a href="/studio.html">Open Strandspace Studio</a>
      </div>
    </main>
  </body>
</html>
