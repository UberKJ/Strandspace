<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strandspace</title>
    <link rel="stylesheet" href="/style.css?v=2026-04-21-workspace-02" />
    <script type="module" src="/workspace/app.js?v=2026-04-21-workspace-02" defer></script>
  </head>
  <body class="workspace-page" data-theme="dark">
    <header class="ss-header" aria-label="Strandspace header">
      <div class="ss-header-left">
        <a class="ss-brand" href="/" aria-label="Strandspace home">
          <span class="ss-mark" aria-hidden="true"></span>
          <span class="ss-title">Strandspace</span>
        </a>
        <nav class="ss-nav" aria-label="Workspace navigation">
          <a class="ss-nav-link is-active" href="/" aria-current="page">Workspace</a>
          <a class="ss-nav-link" href="/subject?subjectId=music-engineering">Topic View</a>
          <a class="ss-nav-link" href="/backend">Backend</a>
        </nav>
      </div>

      <div class="ss-header-center">
        <div class="ss-topic-pill" title="Current topic">
          <span class="ss-pill-label">Topic</span>
          <span id="ss-current-topic" class="ss-pill-value">What is the topic?</span>
        </div>
      </div>

      <div class="ss-header-right">
        <span id="ss-status-badge" class="ss-badge">Loading status...</span>
        <span id="ss-mode-badge" class="ss-badge ss-badge-accent">Draft</span>
        <button id="ss-theme-toggle" type="button" class="ss-button ss-button-secondary">Theme</button>
      </div>
    </header>

    <div class="ss-shell" aria-label="Strandspace workspace shell">
      <aside id="ss-sidebar-left" class="ss-sidebar ss-sidebar-left" aria-label="Left sidebar">
        <div class="ss-panel ss-panel-skeleton">
          <div class="ss-panel-title">Library</div>
          <p class="ss-muted">Loading...</p>
        </div>
      </aside>
      <main id="ss-workspace" class="ss-workspace" aria-label="Workspace">
        <section class="ss-card ss-card-skeleton">
          <h1>Structured construct workspace</h1>
          <p class="ss-muted">The first question is always: What is the topic?</p>
        </section>
      </main>
      <aside id="ss-sidebar-right" class="ss-sidebar ss-sidebar-right" aria-label="Right sidebar">
        <div class="ss-panel ss-panel-skeleton">
          <div class="ss-panel-title">Matches</div>
          <p class="ss-muted">Loading...</p>
        </div>
      </aside>
    </div>

    <footer id="ss-bottom-bar" class="ss-bottom-bar" aria-label="Action bar"></footer>
  </body>
</html>
